name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        env:
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          printf '%s' "$PRODUCTION_ENV_FILE" > .env

      - name: Create tarball
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=coverage \
            --exclude=.env.* \
            --exclude=backend.tar.gz \
            -czf backend.tar.gz .

      - name: Copy files to home
        run: |
          cp ./backend.tar.gz ~/

      - name: Execute docker commands
        run: |
          set -euo pipefail

          DEPLOY_ROOT="$HOME/deployments/self-backend"
          RELEASE_NAME="$(date +%Y_%m_%d_%H_%M_%S)"
          RELEASE_PATH="$DEPLOY_ROOT/$RELEASE_NAME"
          LATEST_PATH="$DEPLOY_ROOT/latest"

          mkdir -p "$DEPLOY_ROOT"

          if [ -d "$LATEST_PATH" ]; then
            cd "$LATEST_PATH"
            if [ -f docker-compose.prod.yml ]; then
              docker compose -f docker-compose.prod.yml down --remove-orphans || true
            fi
          fi

          mkdir -p "$RELEASE_PATH"
          mv ~/backend.tar.gz "$RELEASE_PATH/"
          cd "$RELEASE_PATH"
          tar -xzvf backend.tar.gz

          ln -sfnT "$RELEASE_PATH" "$LATEST_PATH"
          cd "$LATEST_PATH"

          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d
